name: Java CI với Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest,macos-latest,ubuntu-latest]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Thiết lập JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Khớp với cấu hình pom.xml của bạn
          distribution: 'temurin'
          cache: maven

      - name: Thực thi Build Lifecycle (Verify & Coverage)
        run: mvn -B verify
        continue-on-error: true

      - name: Reviewdog - Inline Checkstyle Feedback
        uses: dbelyaev/action-checkstyle@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          checkstyle_version: "10.25.0"
          checkstyle_config: google_checks.xml

      - name: Trích xuất báo cáo JaCoCo (Artifacts)
          # Chỉ upload báo cáo nếu bước build/test trước đó thành công hoặc thất bại
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/

      - name: Lưu trữ tệp .jar (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: math-utils-jar${{ matrix.os }}
          path: target/*.jar