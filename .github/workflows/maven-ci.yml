name: Java CI với Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Thiết lập JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Khớp với cấu hình pom.xml của bạn
          distribution: 'temurin'
          cache: maven

      - name: Thực thi Build Lifecycle (Test & Package)
        run: mvn -B package

      - name: Lưu trữ tệp .jar (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: math-utils-jar
          path: target/*.jar